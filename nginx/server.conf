# /etc/nginx/sites-available/spromaxplast.uz
# Certbot SSL qo'shgandan keyin SSL bloklari avtomatik qo'shiladi:
#   certbot --nginx -d spromaxplast.uz -d www.spromaxplast.uz

server {
    listen 80;
    listen [::]:80;
    server_name spromaxplast.uz www.spromaxplast.uz;

    client_max_body_size 10M;

    # Yuklangan rasmlar — to'g'ridan-to'g'ri diskdan serve qilish
    location /uploads/ {
        alias /var/www/spromaxplast/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri $uri/ =404;
    }

    location / {
        proxy_pass http://localhost:8934;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
