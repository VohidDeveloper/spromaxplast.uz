version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: spromax_db
      POSTGRES_USER: spromax_user
      POSTGRES_PASSWORD: spromax_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - internal

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: spromax_db
      DB_USER: spromax_user
      DB_PASSWORD: spromax_pass
      JWT_SECRET: change_this_to_a_long_random_secret_in_production
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://spromaxplast.uz,https://spromaxplast.uz
      UPLOAD_PATH: uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - postgres
    networks:
      - internal

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - internal

  admin:
    build: ./admin
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8934:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - admin
      - backend
    networks:
      - internal

volumes:
  postgres_data:
  uploads_data:

networks:
  internal:
    driver: bridge
